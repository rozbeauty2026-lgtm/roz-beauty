<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#f5f5f5;
  direction:rtl;
}
.navbar{
  background:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  font-size:20px;
  font-weight:bold;
  color:#8e244d;
}
.cart{
  font-size:20px;
  cursor:pointer;
}
.banner{
  height:180px;
  background:url("https://i.imgur.com/1qKQZ4F.jpg");
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
  font-weight:bold;
}
.categories{
  display:flex;
  gap:10px;
  padding:15px;
  overflow:auto;
}
.cat{
  background:white;
  padding:8px 15px;
  border-radius:20px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
}
.product{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(0,0,0,0.08);
  transition:0.3s;
}
.product:hover{
  transform:translateY(-5px);
}
.product img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.info{
  padding:10px;
}
.name{
  font-size:14px;
  margin-bottom:5px;
}
.price{
  color:#8e244d;
  font-weight:bold;
}
button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  background:#8e244d;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
#cartBox{
  background:white;
  margin:20px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
#cartItems p{
  margin:5px 0;
}
input{
  width:90%;
  padding:8px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Roz Beauty</div>
  <div class="cart">🛒 السلة</div>
</div>

<div class="banner">
أفضل منتجات الجمال
</div>

<div class="categories">
  <div class="cat" onclick="filterCategory('العناية بالبشرة')">العناية بالبشرة</div>
  <div class="cat" onclick="filterCategory('الشعر')">الشعر</div>
  <div class="cat" onclick="filterCategory('المكياج')">المكياج</div>
  <div class="cat" onclick="filterCategory('العروض')">العروض</div>
</div>

<div class="products" id="products"></div>

<div id="cartBox">
<h3>السلة 🛒</h3>
<div id="cartItems"></div>
<p><strong id="totalPrice">الإجمالي: 0 جنيه</strong></p>
<input type="text" id="name" placeholder="الاسم">
<input type="text" id="phone" placeholder="رقم الهاتف">
<input type="text" id="address" placeholder="العنوان">
<button id="submitOrderBtn">تأكيد الطلب</button>
</div>

<script>
const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";
let allProducts = [];
let cart = [];

// تحميل المنتجات من Google Sheet
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  allProducts = data;
  displayProducts(allProducts);
});

function displayProducts(products){
  const container = document.getElementById("products");
  container.innerHTML="";
  products.forEach(p=>{
    container.innerHTML+=`
      <div class="product">
        <img src="${p.image}">
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="price">${p.price} جنيه</div>
          <button onclick='addToCart("${p.name}", ${p.price})'>أضف للسلة</button>
        </div>
      </div>
    `;
  });
}

function filterCategory(cat){
  const filtered = allProducts.filter(p=>p.category===cat);
  displayProducts(filtered);
}

// إضافة للسلة
function addToCart(name, price){
  let found = cart.find(item => item.name===name);
  if(found){ found.qty++; } else { cart.push({name, price:Number(price), qty:1}); }
  updateCart();
}

// تحديث السلة
function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML="";
  let total = 0;
  cart.forEach(item=>{
    total += item.price*item.qty;
    cartDiv.innerHTML+=`<p>${item.name} × ${item.qty} = ${item.price*item.qty} جنيه</p>`;
  });
  document.getElementById("totalPrice").innerText = "الإجمالي: "+total+" جنيه";
}

// تأكيد الطلب وإرساله لـ Google Sheet
document.getElementById("submitOrderBtn").addEventListener("click", function(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("يرجى تعبئة جميع البيانات ✍️");
    return;
  }
  if(cart.length===0){
    alert("السلة فارغة 🛒");
    return;
  }

  let orderItems="";
  let total=0;
  cart.forEach(item=>{
    orderItems+=item.name+" × "+item.qty+" | ";
    total+=item.price*item.qty;
  });

  const orderData = {
    order_id:"ORD"+Date.now(),
    name,
    phone,
    address,
    items:orderItems,
    total,
    date:new Date().toLocaleString()
  };

  fetch("https://script.google.com/macros/s/AKfycbx2Vonr07kkY_BfoGbAunz_kHy0qAKGuoLADXer7LJ5963hpR62efGD-KHjdUA92acT/exec", {
    method:"POST",
    body:JSON.stringify(orderData)
  })
  .then(()=>{ 
    alert("تم استلام طلبك بنجاح 💖");
    cart.length=0;
    updateCart();
    document.getElementById("name").value="";
    document.getElementById("phone").value="";
    document.getElementById("address").value="";
  })
  .catch(err=>{
    console.error(err);
    alert("حدث خطأ أثناء إرسال الطلب");
  });
});
</script>

</body>
</html>
