<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#f5f5f5;direction:rtl;}
.page{display:none}
.page.active{display:block}
input,button{padding:10px;margin:5px;width:90%}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
<h2 style="text-align:center">تسجيل الدخول</h2>
<input id="loginEmail" placeholder="الإيميل">
<input id="loginPass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p onclick="showPage('registerPage')" style="text-align:center;cursor:pointer">إنشاء حساب</p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page">
<h2 style="text-align:center">إنشاء حساب</h2>
<input id="regEmail" placeholder="الإيميل">
<input id="regPass" type="password" placeholder="كلمة المرور">
<button onclick="register()">تسجيل</button>
<p onclick="showPage('loginPage')" style="text-align:center;cursor:pointer">عندي حساب</p>
</div>

<!-- APP -->
<div id="homePage" class="page">

<h2>Roz Beauty 👑</h2>
<button onclick="logout()">تسجيل خروج</button>

<input id="searchInput" placeholder="بحث...">

<div id="products"></div>

<h3>السلة</h3>
<div id="cartItems"></div>
<p id="total"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCsrbD7peZ6JvVtNWnIhvvvYgU1OXkJnJk",
  authDomain: "roz-beauty.firebaseapp.com",
  projectId: "roz-beauty",
  storageBucket: "roz-beauty.firebasestorage.app",
  messagingSenderId: "567483931739",
  appId: "1:567483931739:web:1d6588f80128ae8426337e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* Pages */
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* Register */
function register(){
auth.createUserWithEmailAndPassword(regEmail.value,regPass.value)
.then(()=>{
alert("تم إنشاء الحساب ✅");
showPage('loginPage');
})
.catch(e=>alert(e.message));
}

/* Login */
function login(){
auth.signInWithEmailAndPassword(loginEmail.value,loginPass.value)
.catch(e=>alert(e.message));
}

/* Logout */
function logout(){
auth.signOut();
}

/* Check user */
auth.onAuthStateChanged(user=>{
if(user){
showPage('homePage');
}else{
showPage('loginPage');
}
});

/* Products */
let products=[
{name:"سيرم فيتامين C",price:150},
{name:"كريم ترطيب",price:100},
{name:"عطر فرنسي",price:200}
];

let cart=[];

function renderProducts(){
let container=document.getElementById("products");
container.innerHTML="";

products.forEach(p=>{
let div=document.createElement("div");
div.innerHTML=`
<p>${p.name} - ${p.price} جنيه</p>
<button onclick="addToCart('${p.name}',${p.price})">إضافة</button>
`;
container.appendChild(div);
});
}

function addToCart(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price;
div.innerHTML+=`<p>${i.name}</p>`;
});

document.getElementById("total").innerText="الإجمالي: "+total;
}

renderProducts();
</script>

</body>
    </html>
