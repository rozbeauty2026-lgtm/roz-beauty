<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #ffe6f0;
    direction: rtl;
  }

  /* شاشة البداية */
  #splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
  }
  #splash img {
    width: 150px;
    margin-bottom: 20px;
  }
  #splash h1 {
    font-size: 28px;
    color: #d6336c;
    margin-bottom: 10px;
  }
  #splash p {
    font-size: 18px;
    color: #333;
    margin-bottom: 20px;
  }
  #splash button {
    padding: 12px 25px;
    background-color: #d6336c;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
  }

  /* الصفحة الرئيسية للمنتجات */
  #products {
    display: none;
    padding: 10px;
  }
  .section {
    margin-bottom: 20px;
  }
  .section h2 {
    margin: 10px 0;
    color: #d6336c;
  }
  .product-list {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 10px;
  }
  .product-card {
    background-color: #fff;
    min-width: 150px;
    border-radius: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
    flex-shrink: 0;
  }
  .product-card img {
    width: 100%;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
  }
  .product-card h3 {
    margin: 5px 0;
  }
  .product-card p {
    color: #d6336c;
    font-weight: bold;
  }
  .product-card button {
    margin: 5px 0 10px 0;
    padding: 8px 15px;
    background-color: #d6336c;
    color: #fff;
    border: none;
    border-radius: 15px;
    cursor: pointer;
  }

  /* السلة */
  #cart {
    display: none;
    padding: 20px;
  }
  #cart h2 {
    margin-bottom: 15px;
  }
  .cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    background-color: #fff;
    padding: 10px;
    border-radius: 15px;
  }
  #cart-total {
    font-weight: bold;
    margin-top: 15px;
  }
  #checkoutBtn {
    margin-top: 15px;
    width: 100%;
    padding: 12px 0;
    background-color: #d6336c;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
  }

  /* إتمام الطلب */
  #checkout {
    display: none;
    padding: 20px;
  }
  #checkout input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }
  #placeOrder {
    width: 100%;
    padding: 12px 0;
    background-color: #d6336c;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- شاشة البداية -->
<div id="splash">
  <img src="file:///mnt/data/a_logo_for_roz_beauty_is_set_against_a_soft_pink.png" alt="Roz Beauty">
  <h1>Roz Beauty</h1>
  <p>جمالك يبدأ من هنا 🌸</p>
  <button onclick="startShopping()">ابدئي التسوق</button>
</div>

<!-- الصفحة الرئيسية للمنتجات -->
<div id="products">
  <!-- قسم كريمات -->
  <div class="section">
    <h2>كريمات</h2>
    <div class="product-list">
      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="كريم الترطيب">
        <h3>كريم الترطيب</h3>
        <p>1200 ج</p>
        <button onclick="addToCart('كريم الترطيب',1200)">أضف للسلة</button>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="كريم الليل">
        <h3>كريم الليل</h3>
        <p>1500 ج</p>
        <button onclick="addToCart('كريم الليل',1500)">أضف للسلة</button>
      </div>
    </div>
  </div>

  <!-- قسم ماسكات -->
  <div class="section">
    <h2>ماسكات</h2>
    <div class="product-list">
      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="ماسكات الوجه">
        <h3>ماسكات الوجه</h3>
        <p>900 ج</p>
        <button onclick="addToCart('ماسكات الوجه',900)">أضف للسلة</button>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="ماسك الترطيب">
        <h3>ماسكات الترطيب</h3>
        <p>1100 ج</p>
        <button onclick="addToCart('ماسكات الترطيب',1100)">أضف للسلة</button>
      </div>
    </div>
  </div>

  <button onclick="viewCart()" style="margin-top:20px;padding:10px 20px;background:#d6336c;color:white;border:none;border-radius:20px;">السلة</button>
</div>

<!-- السلة -->
<div id="cart">
  <h2>سلة مشترياتك</h2>
  <div id="cartItems"></div>
  <div id="cart-total"></div>
  <button id="checkoutBtn" onclick="goToCheckout()">إتمام الطلب</button>
</div>

<!-- إتمام الطلب -->
<div id="checkout">
  <h2>إتمام الطلب</h2>
  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="phone" placeholder="رقم الهاتف">
  <input type="text" id="address" placeholder="العنوان">
  <button id="placeOrder" onclick="placeOrder()">تأكيد الطلب</button>
</div>

<script>
let cart = [];

function startShopping() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('products').style.display = 'block';
}

function addToCart(name, price) {
  cart.push({name, price});
  alert(name + " أضيف للسلة");
}

function viewCart() {
  document.getElementById('products').style.display = 'none';
  document.getElementById('cart').style.display = 'block';
  let cartItems = document.getElementById('cartItems');
  cartItems.innerHTML = '';
  let total = 0;
  cart.forEach((item, index) => {
    total += item.price;
    cartItems.innerHTML += `<div class="cart-item">${item.name} - ${item.price} ج<button onclick="removeItem(${index})">حذف</button></div>`;
  });
  document.getElementById('cart-total').innerText = "المجموع: " + total + " ج";
}

function removeItem(index) {
  cart.splice(index, 1);
  viewCart();
}

function goToCheckout() {
  document.getElementById('cart').style.display = 'none';
  document.getElementById('checkout').style.display = 'block';
}

function placeOrder() {
  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;
  let address = document.getElementById('address').value;
  if(name && phone && address) {
    alert("تم استلام طلبك، " + name + " 🌸\nسنوافيك بالتوصيل قريبًا!");
    location.reload();
  } else {
    alert("الرجاء ملء جميع الحقول");
  }
}
</script>
<div id="products"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";

fetch(sheetURL)
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(product => {
      const card = `
        <div class="product-card">
          <img src="${product.image}" width="150">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <p><strong>${product.price} جنيه</strong></p>
        </div>
      `;
      container.innerHTML += card;
    });
  })
  .catch(error => console.error("Error:", error));
</script>

</body>
</body>

</html>
