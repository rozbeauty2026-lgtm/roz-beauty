  <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f9f9f9;
}

/* Header */
.store-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background: #ff4d8d;
  color: white;
}

.cart-icon {
  cursor: pointer;
  font-size: 20px;
}

/* Products */
.products-section {
  padding: 40px;
  text-align: center;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.product-card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
}

.product-card img {
  width: 100%;
  border-radius: 15px;
}

.product-card button {
  background: #ff4d8d;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

/* Cart */
.cart-modal {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.cart-content {
  background: white;
  width: 300px;
  height: 100%;
  position: absolute;
  right: 0;
  padding: 20px;
  overflow-y: auto;
}
</style>
</head>

<body>

<header class="store-header">
  <h1>Roz Beauty 💄</h1>
  <div class="cart-icon" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<section class="products-section">
  <h2>منتجاتنا</h2>
  <div id="products" class="products-grid"></div>
</section>

<!-- Cart -->
<div id="cart-modal" class="cart-modal">
  <div class="cart-content">
    <h3>سلة المشتريات</h3>
    <div id="cart-items"></div>
    <h4>الإجمالي: <span id="total-price">0</span> جنيه</h4>
    <button onclick="checkout()">إتمام الطلب عبر واتساب</button>
    <button onclick="closeCart()">إغلاق</button>
  </div>
</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";
let cart = [];

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("products");
    data.forEach(product => {
      container.innerHTML += `
        <div class="product-card">
          <img src="${product.image}">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <p><strong>${product.price} جنيه</strong></p>
          <button onclick='addToCart(${JSON.stringify(product)})'>
            أضف للسلة
          </button>
        </div>
      `;
    });
  });

function addToCart(product) {
  cart.push(product);
  document.getElementById("cart-count").innerText = cart.length;
  updateCart();
}

function updateCart() {
  const cartItems = document.getElementById("cart-items");
  const totalPrice = document.getElementById("total-price");
  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += parseInt(item.price);
    cartItems.innerHTML += `<p>${item.name} - ${item.price} جنيه</p>`;
  });

  totalPrice.innerText = total;
}

function openCart() {
  document.getElementById("cart-modal").style.display = "block";
}

function closeCart() {
  document.getElementById("cart-modal").style.display = "none";
}

function checkout() {
  let message = "طلب جديد:%0A";
  cart.forEach(item => {
    message += `${item.name} - ${item.price} جنيه%0A`;
  });

  //
  window.open(`https://wa.me/249111311358?text=${message}`);
}
</script>

</body>
</html>
