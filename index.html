<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Roz Beauty</div>
  <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="banner">
  <img src="https://i.imgur.com/6RPSMJC.png" alt="Roz Beauty Banner">
</div>

<div class="categories-container">
  <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
  <div class="cat" data-category="العناية بالبشرة">العناية بالبشرة</div>
  <div class="cat" data-category="الشعر">العناية بالشعر</div>
  <div class="cat" data-category="المكياج">المكياج</div>
  <div class="cat" data-category="العطور">العطور</div>
  <div class="cat" data-category="العروض">العروض</div>
  <div class="cat" data-category="شنط وملابس">شنط وملابس</div>
  <div class="cat" data-category="إكسسوارات">إكسسوارات</div>
</div>

<div class="products" id="products"></div>

<div id="cartBox">
  <h3>السلة 🛒</h3>
  <div id="cartItems"></div>
  <p><strong id="totalPrice"></strong></p>
  <input type="text" id="name" placeholder="الاسم" required>
  <input type="text" id="phone" placeholder="رقم الهاتف" required>
  <input type="text" id="address" placeholder="العنوان" required>
  <button onclick="submitOrder()">تأكيد الطلب</button>
</div>

<script src="script.js"></script>
</body>
</html>
