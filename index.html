<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#fdf4f7;
  direction:rtl;
}
/* Navbar */
.navbar{
  background:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  font-size:22px;
  font-weight:bold;
  color:#d6336c;
}
.cart{
  font-size:20px;
  cursor:pointer;
  position:relative;
}
.cart span{
  background:#d6336c;
  color:white;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
  position:absolute;
  top:-8px;
  right:-10px;
}
/* Banner */
.banner{
  height:220px;
  background:url("https://i.imgur.com/1qKQZ4F.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:32px;
  font-weight:bold;
  text-shadow:1px 1px 4px rgba(0,0,0,0.6);
}
/* Categories */
.categories{
  display:flex;
  gap:12px;
  padding:15px;
  overflow-x:auto;
}
.cat{
  background:white;
  padding:10px 20px;
  border-radius:25px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
  white-space:nowrap;
  font-weight:bold;
  transition:0.3s;
}
.cat:hover{
  background:#d6336c;
  color:white;
}
/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}
.product{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}
.product:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
.product img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.info{
  padding:10px;
}
.name{
  font-size:15px;
  margin-bottom:5px;
  font-weight:bold;
}
.price{
  color:#d6336c;
  font-weight:bold;
  font-size:14px;
}
button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  background:#d6336c;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
button:hover{
  background:#a82b55;
}
/* Cart */
#cartBox{
  background:white;
  margin:20px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 3px 12px rgba(0,0,0,0.1);
}
#cartBox h3{
  margin-top:0;
  color:#d6336c;
}
#cartItems p{
  margin:5px 0;
  font-weight:bold;
}
input{
  width:95%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}
input:focus{
  outline:none;
  border-color:#d6336c;
  box-shadow:0 0 5px rgba(214,51,108,0.4);
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">Roz Beauty</div>
  <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="banner">أفضل منتجات الجمال</div>

<div class="categories">
  <div class="cat">العناية بالبشرة</div>
  <div class="cat">الشعر</div>
  <div class="cat">المكياج</div>
  <div class="cat">العروض</div>
</div>

<div class="products" id="products"></div>

<div id="cartBox">
  <h3>السلة 🛒</h3>
  <div id="cartItems"></div>
  <p><strong id="totalPrice"></strong></p>
  <input type="text" id="name" placeholder="الاسم" required>
  <input type="text" id="phone" placeholder="رقم الهاتف" required>
  <input type="text" id="address" placeholder="العنوان" required>
  <button onclick="submitOrder()">تأكيد الطلب</button>
</div>

<script>
const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";
let cart=[];

// جلب المنتجات من Google Sheet
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  const container=document.getElementById("products");
  data.forEach(p=>{
    container.innerHTML+=`
    <div class="product">
      <img src="${p.image}">
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="price">${p.price} جنيه</div>
        <button onclick='addToCart("${p.name}",${p.price})'>أضف للسلة</button>
      </div>
    </div>`;
  });
});

// إضافة منتج للسلة
function addToCart(name, price){
  cart.push({name, price, quantity:1});
  updateCart();
}

// تحديث عرض السلة
function updateCart(){
  const cartDiv=document.getElementById("cartItems");
  cartDiv.innerHTML="";
  let total=0;
  cart.forEach(item=>{
    total += Number(item.price)*item.quantity;
    cartDiv.innerHTML+=`<p>${item.name} × ${item.quantity} - ${item.price} جنيه</p>`;
  });
  document.getElementById("totalPrice").innerText="الإجمالي: "+total+" جنيه";
  document.getElementById("cartCount").innerText=cart.length;
}

// إرسال الطلب إلى Google Sheet
function submitOrder() {
  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const address=document.getElementById("address").value;

  let items=cart.map(i=>i.name+" × "+i.quantity).join(" | ");
  let total=cart.reduce((sum,i)=>sum+i.price*i.quantity,0);

  fetch("https://script.google.com/macros/s/AKfycbwJOdPdKK4Kxkwy-MxGNvPSDI8HGcgkCyVMjDtsNAbYZmdHNxgEGJQQQEzUlzTEujv7TA/exec",{
    method:"POST",
    body:JSON.stringify({name, phone, address, items, total})
  })
  .then(res=>res.json())
  .then(res=>{
    if(res.status==="success"){
      alert("تم إرسال الطلب بنجاح 💖");
      cart=[];
      updateCart();
    } else {
      alert("حدث خطأ أثناء إرسال الطلب: "+res.message);
    }
  })
  .catch(err=>{
    alert("حدث خطأ أثناء إرسال الطلب: "+err);
  });
}
</script>

</body>
       </html>
