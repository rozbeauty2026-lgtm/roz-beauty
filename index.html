!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roz Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#f5f5f5;
direction:rtl;
}

/* Navbar */

.navbar{
background:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:20px;
font-weight:bold;
color:#8e244d;
}

.cart{
font-size:20px;
}

/* بانر */

.banner{
height:180px;
background:url("https://i.imgur.com/1qKQZ4F.jpg");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
font-weight:bold;
}

/* الأقسام */

.categories{
display:flex;
gap:10px;
padding:15px;
overflow:auto;
}

.cat{
background:white;
padding:8px 15px;
border-radius:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* المنتجات */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-size:14px;
margin-bottom:5px;
}

.price{
color:#8e244d;
font-weight:bold;
}

button{
width:100%;
margin-top:8px;
padding:8px;
border:none;
background:#8e244d;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">Roz Beauty</div>

<div class="cart">🛒</div>

</div>

<div class="banner">
أفضل منتجات الجمال
</div>

<div class="categories">

<div class="cat">العناية بالبشرة</div>
<div class="cat">الشعر</div>
<div class="cat">المكياج</div>
<div class="cat">العروض</div>

</div>

<div class="products" id="products"></div>

<script>

const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("products");

data.forEach(p=>{

container.innerHTML+=`

<div class="product">

<img src="${p.image}">

<div class="info">

<div class="name">${p.name}</div>

<div class="price">${p.price} جنيه</div>

<button>عرض المنتج</button>

</div>

</div>

`;

});

});

</script>
<form id="orderForm">
<input type="text" id="name" placeholder="الاسم" required>
<input type="text" id="phone" placeholder="رقم الهاتف" required>
<input type="text" id="address" placeholder="العنوان" required>
<button type="submit">إرسال الطلب</button>
</form>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

let data = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value
};

fetch("https://script.google.com/macros/s/AKfycbx2Vonr07kkY_BfoGbAunz_kHy0qAKGuoLADXer7LJ5963hpR62efGD-KHjdUA92acT/exec",{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{
alert("تم إرسال الطلب");
});
});
</script>
</body>

</html
