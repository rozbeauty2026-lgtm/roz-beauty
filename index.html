<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ======================== */
/* عام */
body{margin:0;font-family:'Cairo',sans-serif;background:#f5f5f5;direction:rtl;transition:background 0.3s,color 0.3s;}
body.dark{background:#121212;color:white;}

/* Navbar */
.navbar{background:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:100;}
body.dark .navbar{background:#1f1f1f;color:white;}
.logo{font-size:22px;font-weight:bold;color:#8e244d;}
body.dark .logo{color:#ff6f91;}
.cart{font-size:20px;cursor:pointer;}

/* Slider */
.slider{width:95%;height:150px;margin:10px auto;overflow:hidden;position:relative;border-radius:15px;}
.slide{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s;}
.slide.active{opacity:1;}

/* البحث */
.search-box{padding:15px;}
.search-box input{width:100%;padding:12px;border-radius:14px;border:1px solid #ddd;font-size:16px;}
body.dark .search-box input{background:#1f1f1f;color:white;border:1px solid #333;}

/* Categories */
.categories{display:flex;gap:16px;padding:15px;overflow-x:auto;}
.cat{flex:0 0 auto;background:white;padding:15px;border-radius:20px;box-shadow:0 6px 15px rgba(0,0,0,0.08);cursor:pointer;text-align:center;width:110px;}
body.dark .cat{background:#1f1f1f;box-shadow:0 6px 15px rgba(0,0,0,0.4);}
.cat img{width:70px;height:70px;object-fit:cover;border-radius:16px;display:block;margin:auto;}
.cat span{font-size:14px;display:block;margin-top:8px;font-weight:600;}

/* Products */
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:15px;padding:15px;}
.product{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 18px rgba(0,0,0,0.08);transition:0.3s;}
body.dark .product{background:#1f1f1f;box-shadow:0 8px 18px rgba(0,0,0,0.4);}
.product:hover{transform:translateY(-5px);}
.product img{width:100%;height:200px;object-fit:cover;}
.info{padding:10px;}
.name{font-size:14px;margin-bottom:5px;}
.price{color:#8e244d;font-weight:bold;}
body.dark .price{color:#ff6f91;}
button{width:100%;margin-top:8px;padding:10px;border:none;background:#8e244d;color:white;border-radius:10px;cursor:pointer;}

/* Cart */
#cartBox{background:white;margin:20px;padding:15px;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
body.dark #cartBox{background:#1f1f1f;color:white;box-shadow:0 3px 8px rgba(0,0,0,0.4);}
#cartBox input{width:90%;padding:8px;margin:6px 0;}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:200;}
.modal-content{background:white;padding:20px;border-radius:12px;width:90%;max-width:400px;position:relative;}
body.dark .modal-content{background:#2a2a2a;color:white;}
.modal-close{position:absolute;top:10px;right:15px;cursor:pointer;font-size:18px;font-weight:bold;}
.modal-content select,input{width:100%;padding:8px;margin:8px 0;border-radius:8px;border:1px solid #ccc;}

/* Pages */
.page{display:none;}
.page.active{display:block;}

/* Navigation Bottom */
.nav-bottom{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:white;padding:10px 0;box-shadow:0 -2px 8px rgba(0,0,0,0.1);}
body.dark .nav-bottom{background:#1f1f1f;color:white;box-shadow:0 -2px 8px rgba(0,0,0,0.4);}
.nav-bottom div{cursor:pointer;font-weight:bold;color:#8e244d;text-align:center;font-size:14px;}
body.dark .nav-bottom div{color:#ff6f91;}

/* Settings */
.settings-option{padding:15px;border-bottom:1px solid #ddd;}
body.dark .settings-option{border-color:#333;}
label{display:block;margin-top:10px;margin-bottom:5px;}
</style>
</head>
<body>

<!-- ========================= Navbar ========================= -->
<div class="navbar">
    <div class="logo">Roz Beauty</div>
    <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<!-- ========================= Pages ========================= -->

<!-- Home Page -->
<div id="homePage" class="page active">
    <div class="slider">
        <img src="https://i.imgur.com/n9ZVlX2.png" class="slide active">
        <img src="https://i.imgur.com/rb86TWc.jpg" class="slide">
        <img src="https://i.imgur.com/19yLtSC.jpg" class="slide">
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
    </div>
    <div class="categories" id="categories"></div>
    <div class="products" id="products"></div>
</div>

<!-- Cart Page -->
<div id="cartPage" class="page">
    <div id="cartBox">
        <h3>السلة 🛒</h3>
        <div id="cartItems"></div>
        <p><strong id="totalPrice"></strong></p>
        <input type="text" id="name" placeholder="الاسم">
        <input type="text" id="phone" placeholder="رقم الهاتف">
        <input type="text" id="address" placeholder="العنوان">
        <button onclick="submitOrder()">تأكيد الطلب</button>
    </div>
</div>

<!-- Settings Page -->
<div id="settingsPage" class="page">
    <h2 style="text-align:center;margin-top:20px;">الإعدادات</h2>

    <div class="settings-option">
        <label>الوضع الليلي / النهاري</label>
        <button id="toggleDark">تبديل الوضع</button>
    </div>

    <div class="settings-option">
        <label>اللغة</label>
        <select id="languageSelect">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="settings-option">
        <label>الاسم</label>
        <input type="text" id="userName">
        <label>رقم الهاتف</label>
        <input type="text" id="userPhone">
        <label>العنوان</label>
        <input type="text" id="userAddress">
        <button id="saveUserData">حفظ البيانات</button>
    </div>
</div>

<!-- Product Modal -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <h3 id="modalName"></h3>
        <img id="modalImg" src="" style="width:100%;height:180px;object-fit:cover;border-radius:12px;">
        <p id="modalDescription"></p>
        <label>اللون:</label>
        <select id="modalColor"></select>
        <label>الحجم:</label>
        <select id="modalSize"></select>
        <label>الكمية:</label>
        <input type="number" id="modalQuantity" value="1" min="1">
        <p>السعر: <span id="modalPrice"></span> جنيه</p>
        <button id="modalAddToCart">أضف للسلة</button>
    </div>
</div>

<!-- Navigation Bottom -->
<div class="nav-bottom">
    <div onclick="showPage('homePage')">الرئيسية</div>
    <div onclick="showPage('cartPage')">السلة</div>
    <div onclick="showPage('settingsPage')">الإعدادات</div>
</div>

<!-- ========================= Scripts ========================= -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
/* ================= Firebase Config ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCsrbD7peZ6JvVtNWnIhvvvYgU1OXkJnJk",
  authDomain: "roz-beauty.firebaseapp.com",
  projectId: "roz-beauty",
  storageBucket: "roz-beauty.firebasestorage.app",
  messagingSenderId: "567483931739",
  appId: "1:567483931739:web:1d6588f80128ae8426337e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ================= Pages ================= */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= Auth ================= */
// Register
function register(email,pass){
  auth.createUserWithEmailAndPassword(email,pass)
  .then(()=>{alert("تم إنشاء الحساب ✅");})
  .catch(e=>alert(e.message));
}
// Login
function login(email,pass){
  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{showPage('homePage');})
  .catch(e=>alert(e.message));
}
// Logout
function logout(){auth.signOut();}

// Auth State
auth.onAuthStateChanged(user=>{
  if(user) showPage('homePage');
  else showPage('loginPage');
});

/* ================= Products ================= */
let cart=[]; let productsData=[];
const sections=[
  {name:"العناية بالبشرة",img:"https://i.imgur.com/rb86TWc.jpg"},
  {name:"العناية بالشعر",img:"https://i.imgur.com/19yLtSC.jpg"},
  {name:"المكياج",img:"https://i.imgur.com/E6QEprz.png"},
  {name:"العطور",img:"https://i.imgur.com/PXpmpHB.png"},
  {name:"العروض",img:"https://i.imgur.com/BFBplR8.png"},
  {name:"شنط وملابس",img:"https://i.imgur.com/TS5Egq.png"},
  {name:"إكسسوارات",img:"https://i.imgur.com/JftwUHq.png"}
];
const catContainer=document.getElementById("categories");
sections.forEach(cat=>{
  const div=document.createElement("div");
  div.className="cat";
  div.innerHTML=`<img src="${cat.img}"><span>${cat.name}</span>`;
  div.onclick=()=>filterProducts(cat.name);
  catContainer.appendChild(div);
});

/* يمكنك ربط هذا بجوجل شيت أو Firebase لتحديث المنتجات ديناميكياً */
productsData=[
  {name:"سيرم فيتامين C",image:"https://i.imgur.com/n9ZVlX2.png",price:150,Category:"العناية بالبشرة"},
  {name:"كريم ترطيب",image:"https://i.imgur.com/rb86TWc.jpg",price:100,Category:"العناية بالبشرة"},
  {name:"عطر فرنسي",image:"https://i.imgur.com/19yLtSC.jpg",price:200,Category:"العطور"}
];

displayProducts(productsData);

function displayProducts(list){
  const container=document.getElementById("products");
  container.innerHTML="";
  list.forEach(p=>{
    const prodDiv=document.createElement("div");
    prodDiv.className="product";
    prodDiv.innerHTML=`<img src="${p.image}"><div class="info"><div class="name">${p.name}</div><div class="price">${p.price} جنيه</div><button>تفاصيل</button></div>`;
    prodDiv.querySelector("button").onclick=()=>openModal(p);
    container.appendChild(prodDiv);
  });
}

function filterProducts(category){
  displayProducts(productsData.filter(p=>p.Category===category));
}

// Search
document.getElementById("searchInput").addEventListener("input",e=>{
  const query=e.target.value.toLowerCase();
  displayProducts(productsData.filter(p=>p.name.toLowerCase().includes(query)));
});

/* ================= Cart ================= */
function addToCart(name,price){
  let item=cart.find(i=>i.name===name);
  if(item){item.quantity++;}
  else{cart.push({name,price,quantity:1});}
  updateCart();
}
function updateCart(){
  const cartDiv=document.getElementById("cartItems");
  cartDiv.innerHTML="";
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.quantity;
    cartDiv.innerHTML+=`<p>${item.name} × ${item.quantity} - ${item.price} جنيه</p>`;
  });
  document.getElementById("totalPrice").innerText="الإجمالي: "+total+" جنيه";
  document.getElementById("cartCount").innerText=cart.length;
}

/* ================= Modal ================= */
const modal=document.getElementById("productModal");
const modalClose=document.getElementById("modalClose");
const modalName=document.getElementById("modalName");
const modalImg=document.getElementById("modalImg");
const modalDescription=document.getElementById("modalDescription");
const modalColor=document.getElementById("modalColor");
const modalSize=document.getElementById("modalSize");
const modalQuantity=document.getElementById("modalQuantity");
const modalPrice=document.getElementById("modalPrice");
const modalAddToCart=document.getElementById("modalAddToCart");

function openModal(p){
  modal.style.display="flex";
  modalName.innerText=p.name;
  modalImg.src=p.image;
  modalDescription.innerText=p.description||"";
  modalQuantity.value=1;
  modalColor.innerHTML=""; modalSize.innerHTML="";
  modalAddToCart.onclick=()=>{addToCart(p.name,p.price); alert("تم إضافة المنتج للسلة"); modal.style.display="none";}
}
modalClose.onclick=()=>modal.style.display="none";
window.onclick=e=>{if(e.target==modal) modal.style.display="none";}

/* ================= Settings ================= */
const toggleDark=document.getElementById("toggleDark");
const languageSelect=document.getElementById("languageSelect");
const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const userAddress=document.getElementById("userAddress");
const saveUserData=document.getElementById("saveUserData");

// Load settings
if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark");
if(localStorage.getItem("language")) languageSelect.value=localStorage.getItem("language");
if(localStorage.getItem("userName")) userName.value=localStorage.getItem("userName");
if(localStorage.getItem("userPhone")) userPhone.value=localStorage.getItem("userPhone");
if(localStorage.getItem("userAddress")) userAddress.value=localStorage.getItem("userAddress");

// Dark Mode toggle
toggleDark.onclick=()=>{document.body.classList.toggle("dark");localStorage.setItem("darkMode",document.body.classList.contains("dark"));};
// Language change
languageSelect.onchange=()=>{localStorage.setItem("language",languageSelect.value);alert("تم تغيير اللغة إلى "+languageSelect.options[languageSelect.selectedIndex].text);};
// Save user data
saveUserData.onclick=()=>{localStorage.setItem("userName",userName.value);localStorage.setItem("userPhone",userPhone.value);localStorage.setItem("userAddress",userAddress.value);alert("تم حفظ البيانات بنجاح!");};
</script>
</body>
          </html>
