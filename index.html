<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roz Beauty</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

/* الهيدر */

header{
background:#8e244d;
color:white;
padding:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

/* البانر */

.banner{
background:url("https://i.imgur.com/1qKQZ4F.jpg");
height:150px;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
font-weight:bold;
}

/* الأقسام */

.categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
gap:10px;
}

.categories button{
background:#eee;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.categories button:hover{
background:#8e244d;
color:white;
}

/* البحث */

.searchBox{
padding:10px;
background:white;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* المنتجات */

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.product-card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.product-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#8e244d;
font-weight:bold;
margin-top:5px;
}

button{
background:#8e244d;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

/* السلة */

#cartBox{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.remove{
background:red;
font-size:12px;
padding:3px 6px;
}

input{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<header>Roz Beauty Store 💄</header>

<div class="banner">
أفضل منتجات العناية بالبشرة
</div>

<div class="categories">

<button onclick="filterCategory('all')">الكل</button>

<button onclick="filterCategory('عناية بالبشرة')">
العناية بالبشرة
</button>

<button onclick="filterCategory('الشعر')">
الشعر
</button>

<button onclick="filterCategory('مكياج')">
المكياج
</button>

<button onclick="filterCategory('اكسسوارات')">
اكسسوارات
</button>

</div>

<div class="searchBox">
<input type="text" placeholder="ابحث عن منتج..." onkeyup="searchProducts(this.value)">
</div>

<div id="products"></div>

<div id="cartBox">

<h3>السلة 🛒</h3>

<div id="cartItems"></div>

<p id="totalPrice"></p>

<h4>معلومات الطلب</h4>

<input type="text" id="name" placeholder="الاسم">

<input type="text" id="phone" placeholder="رقم الهاتف">

<input type="text" id="address" placeholder="العنوان">

<button onclick="submitOrder()">تأكيد الطلب</button>

</div>

<script>

const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";

let products=[];
let cart=[];

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
products=data;
displayProducts(products);
});

function displayProducts(list){

const container=document.getElementById("products");

container.innerHTML="";

list.forEach(product=>{

container.innerHTML+=`

<div class="product-card">

<img src="${product.image}">

<h4>${product.name}</h4>

<p>${product.description||""}</p>

<div class="price">${product.price} جنيه</div>

<button onclick='addToCart("${product.name}",${product.price})'>
أضف للسلة
</button>

</div>

`;

});

}

function searchProducts(text){

const filtered=products.filter(p=>
p.name.includes(text)
);

displayProducts(filtered);

}

function filterCategory(cat){

if(cat==="all"){
displayProducts(products);
return;
}

const filtered=products.filter(p=>
p.category===cat
);

displayProducts(filtered);

}

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function updateCart(){

const cartDiv=document.getElementById("cartItems");

cartDiv.innerHTML="";

let total=0;

cart.forEach((item,i)=>{

total+=Number(item.price);

cartDiv.innerHTML+=`

<div class="cart-item">

<span>${item.name} - ${item.price}</span>

<button class="remove" onclick="removeItem(${i})">X</button>

</div>

`;

});

document.getElementById("totalPrice").innerText=
"الإجمالي: "+total+" جنيه";

}

function submitOrder(){

if(cart.length===0){

alert("السلة فارغة");

return;

}

alert("تم استلام طلبك بنجاح 💖");

cart=[];

updateCart();

}

</script>

</body>
  </html>
