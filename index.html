<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f8f8f8;
  text-align:center;
}

header{
  background:#8e244d;
  color:white;
  padding:15px;
  font-size:22px;
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.product-card{
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.product-card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#8e244d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  margin-top:8px;
}

#cartBox{
  background:white;
  margin:20px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input{
  width:90%;
  padding:8px;
  margin:6px 0;
}
</style>
</head>

<body>

<header>Roz Beauty Store 💄</header>

<div id="products"></div>

<div id="cartBox">
<h3>السلة 🛒</h3>
<div id="cartItems"></div>
<p><strong id="totalPrice"></strong></p>

<input type="text" id="name" placeholder="الاسم">
<input type="text" id="phone" placeholder="رقم الهاتف">
<input type="text" id="address" placeholder="العنوان">

<button onclick="submitOrder()">تأكيد الطلب</button>
</div>

<form id="orderForm" method="POST"
action="https://script.google.com/macros/s/AKfycbyUu-xe6ccYKtfKb5SbgnYlJsTZiunn1m9nrhsv65RESoSOIQtVleLm6weeK0EyVwoF/exec"
target="hidden_iframe">

<input type="hidden" name="name" id="hiddenName">
<input type="hidden" name="phone" id="hiddenPhone">
<input type="hidden" name="address" id="hiddenAddress">
<input type="hidden" name="cart" id="hiddenCart">

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

const sheetURL = "https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";

let cart = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");
  data.forEach(product => {
    container.innerHTML += `
      <div class="product-card">
        <img src="${product.image}">
        <h4>${product.name}</h4>
        <p>${product.description}</p>
        <strong>${product.price} جنيه</strong><br>
        <button onclick='addToCart("${product.name}", ${product.price})'>
        أضف للسلة
        </button>
      </div>
    `;
  });
});

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach(item=>{
    total += Number(item.price);
    cartDiv.innerHTML += `<p>${item.name} - ${item.price} جنيه</p>`;
  });

  document.getElementById("totalPrice").innerText = "الإجمالي: " + total + " جنيه";
}

function submitOrder(){

  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  document.getElementById("hiddenName").value =
  document.getElementById("name").value;

  document.getElementById("hiddenPhone").value =
  document.getElementById("phone").value;

  document.getElementById("hiddenAddress").value =
  document.getElementById("address").value;

  document.getElementById("hiddenCart").value =
  JSON.stringify(cart);

  document.getElementById("orderForm").submit();

  alert("تم استلام طلبك بنجاح 💖");

  cart = [];
  updateCart();
}

</script>

</body>
  </html>
