<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#f5f5f5;
  direction:rtl;
}

/* Navbar */
.navbar{
  background:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{ font-size:22px; font-weight:bold; color:#8e244d; }
.cart{ font-size:20px; cursor:pointer; }

/* Banner */
.banner{
  height:180px;
  background:url("https://i.imgur.com/n9ZVlX2.png");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
  border-radius:12px;
}

/* Search */
.search-box{ padding:15px; }
.search-box input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

/* Categories */
.categories{
  display:flex;
  gap:12px;
  padding:10px 15px;
  overflow-x:auto;
}
.cat{
  flex:0 0 auto;
  background:white;
  padding:8px;
  border-radius:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
  text-align:center;
  width:80px;
  transition:0.2s;
}
.cat.active{ background:#8e244d; color:white; }
.cat img{ width:55px; height:55px; object-fit:cover; border-radius:10px; margin-bottom:5px; }
.cat span{ font-size:12px; display:block; }

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
}
.product{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(0,0,0,0.08);
  transition:0.3s;
}
.product:hover{ transform:translateY(-5px); }
.product img{ width:100%; height:170px; object-fit:cover; }
.info{ padding:10px; }
.name{ font-size:14px; margin-bottom:5px; }
.price{ color:#8e244d; font-weight:bold; }
button.addToCart{
  width:100%; margin-top:8px; padding:8px; border:none;
  background:#8e244d; color:white; border-radius:8px; cursor:pointer;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">Roz Beauty</div>
  <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="banner">أفضل منتجات الجمال</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

<div class="categories" id="categories"></div>

<div class="products" id="products"></div>

<script>
const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";
let productsData=[];

// الأقسام
const categoriesList=[
  {name:"الكل", icon:"https://i.imgur.com/n9ZVlX2.png"},
  {name:"العناية بالبشرة", icon:"https://i.imgur.com/rb86TWc.jpg"},
  {name:"العناية بالشعر", icon:"https://i.imgur.com/19yLtSC.jpg"},
  {name:"المكياج", icon:"https://i.imgur.com/E6QEprz.png"},
  {name:"العطور", icon:"https://i.imgur.com/PXpmpHB.png"},
  {name:"العروض", icon:"https://i.imgur.com/BFBplR8.png"},
  {name:"شنط وملابس", icon:"https://i.imgur.com/TS5EgqL.png"},
  {name:"إكسسوارات", icon:"https://i.imgur.com/JftwUHq.png"}
];

// إنشاء الأقسام
const categoriesDiv=document.getElementById("categories");
categoriesList.forEach(c=>{
  const div=document.createElement("div");
  div.className="cat";
  div.dataset.category=c.name;
  div.innerHTML=`<img src="${c.icon}"><span>${c.name}</span>`;
  div.addEventListener("click",()=>{
    document.querySelectorAll(".cat").forEach(el=>el.classList.remove("active"));
    div.classList.add("active");
    filterProducts(c.name);
  });
  categoriesDiv.appendChild(div);
});

// جلب المنتجات
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  productsData=data;
  displayProducts(productsData);
});

// عرض المنتجات
function displayProducts(list){
  const container=document.getElementById("products");
  container.innerHTML="";
  list.forEach(p=>{
    container.innerHTML+=`
    <div class="product">
      <img src="${p.image}">
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="price">${p.price} جنيه</div>
        <button class="addToCart">أضف للسلة</button>
      </div>
    </div>`;
  });
}

// فلترة حسب القسم
function filterProducts(category){
  if(category==="الكل"){ displayProducts(productsData); return; }
  const filtered=productsData.filter(p=>p.Category && p.Category.trim()===category);
  displayProducts(filtered);
}

// البحث
document.getElementById("searchInput").addEventListener("input",e=>{
  const query=e.target.value.toLowerCase();
  const filtered=productsData.filter(p=>
    (p.name && p.name.toLowerCase().includes(query)) ||
    (p.Category && p.Category.toLowerCase().includes(query))
  );
  displayProducts(filtered);
});
</script>

</body>
</html>
