<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#f5f5f5;
direction:rtl;
}

/* NAVBAR */

.navbar{
background:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
color:#8e244d;
}

.cart{
font-size:20px;
cursor:pointer;
}

/* SLIDER */

.slider{
width:95%;
height:150px;
margin:10px auto;
overflow:hidden;
position:relative;
border-radius:15px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

/* SEARCH */

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid #ddd;
font-size:16px;
}

/* CATEGORIES */

.categories{
display:flex;
gap:16px;
padding:15px;
overflow-x:auto;
}

.cat{
flex:0 0 auto;
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
cursor:pointer;
text-align:center;
width:110px;
}

.cat img{
width:70px;
height:70px;
object-fit:cover;
border-radius:16px;
display:block;
margin:auto;
}

.cat span{
font-size:14px;
display:block;
margin-top:8px;
font-weight:600;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-size:14px;
margin-bottom:5px;
}

.price{
color:#8e244d;
font-weight:bold;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
background:#8e244d;
color:white;
border-radius:10px;
cursor:pointer;
}

/* CART */

#cartBox{
background:white;
margin:20px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

#cartBox input{
width:90%;
padding:8px;
margin:6px 0;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:200;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
position:relative;
}

.modal-close{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.modal-content select,input{
width:100%;
padding:8px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">Roz Beauty</div>
<div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="slider">
<img src="https://i.imgur.com/n9ZVlX2.png" class="slide active">
<img src="https://i.imgur.com/rb86TWc.jpg" class="slide">
<img src="https://i.imgur.com/19yLtSC.jpg" class="slide">
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

<div class="categories" id="categories"></div>

<div class="products" id="products"></div>

<div id="cartBox">
<h3>السلة 🛒</h3>
<div id="cartItems"></div>
<p><strong id="totalPrice"></strong></p>

<input type="text" id="name" placeholder="الاسم">
<input type="text" id="phone" placeholder="رقم الهاتف">
<input type="text" id="address" placeholder="العنوان">

<button onclick="submitOrder()">تأكيد الطلب</button>
</div>

<div class="modal" id="productModal">

<div class="modal-content">

<span class="modal-close" id="modalClose">&times;</span>

<h3 id="modalName"></h3>

<img id="modalImg" src="" style="width:100%;height:180px;object-fit:cover;border-radius:12px;">

<p id="modalDescription"></p>

<label>اللون:</label>
<select id="modalColor"></select>

<label>الحجم:</label>
<select id="modalSize"></select>

<label>الكمية:</label>
<input type="number" id="modalQuantity" value="1" min="1">

<p>السعر: <span id="modalPrice"></span> جنيه</p>

<button id="modalAddToCart">أضف للسلة</button>

</div>
</div>

<script>

const sheetURL="https://opensheet.elk.sh/1v0nH08PXdDqThcLCpMaWv-hzQCAHdGQG3kYLAQoVQEs/Sheet1";

let productsData=[];
let cart=[];

const sections=[
{name:"العناية بالبشرة",img:"https://i.imgur.com/rb86TWc.jpg"},
{name:"العناية بالشعر",img:"https://i.imgur.com/19yLtSC.jpg"},
{name:"المكياج",img:"https://i.imgur.com/E6QEprz.png"},
{name:"العطور",img:"https://i.imgur.com/PXpmpHB.png"},
{name:"العروض",img:"https://i.imgur.com/BFBplR8.png"},
{name:"شنط وملابس",img:"https://i.imgur.com/TS5EgqL.png"},
{name:"إكسسوارات",img:"https://i.imgur.com/JftwUHq.png"}
];

const catContainer=document.getElementById("categories");

sections.forEach(cat=>{
const div=document.createElement("div");
div.className="cat";
div.innerHTML=`<img src="${cat.img}"><span>${cat.name}</span>`;
div.onclick=()=>filterProducts(cat.name);
catContainer.appendChild(div);
});

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
productsData=data;
displayProducts(productsData);
});

function displayProducts(list){

const container=document.getElementById("products");
container.innerHTML="";

list.forEach(p=>{

const prodDiv=document.createElement("div");

prodDiv.className="product";

prodDiv.innerHTML=`
<img src="${p.image}">
<div class="info">
<div class="name">${p.name}</div>
<div class="price">${p.price} جنيه</div>
<button onclick='openModal(${JSON.stringify(p)})'>تفاصيل</button>
</div>
`;

container.appendChild(prodDiv);

});

}

function filterProducts(category){

const filtered=productsData.filter(p=>p.Category===category);

displayProducts(filtered);

}

document.getElementById("searchInput").addEventListener("input",e=>{

const query=e.target.value.toLowerCase();

const filtered=productsData.filter(p=>p.name.toLowerCase().includes(query));

displayProducts(filtered);

});

/* SLIDER */

let slides=document.querySelectorAll(".slide");

let index=0;

setInterval(()=>{

slides[index].classList.remove("active");

index=(index+1)%slides.length;

slides[index].classList.add("active");

},3000);

</script>

</body>
  </html>
